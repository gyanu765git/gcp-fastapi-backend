name: CI-CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# 🔥 REQUIRED FIX (this solves your auth error)
permissions:
  contents: read
  id-token: write

jobs:

  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Validate Python syntax
        run: python -m py_compile main.py

      - name: Start app and run smoke test
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          curl --fail http://127.0.0.1:8000/health


  build-docker-image:
    name: Build Docker image
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t fastapi-healthcheck:ci .


  push-to-artifact-registry:
    name: Push Docker image to Artifact Registry
    needs: build-docker-image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: project-6206f1cc-135e-44bd-acf
      GCP_AR_LOCATION: asia-south1
      GCP_AR_REPOSITORY: fastapi-images
      IMAGE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 AUTH USING WORKLOAD IDENTITY (NO JSON KEY)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/115566091564/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-sa@project-6206f1cc-135e-44bd-acf.iam.gserviceaccount.com"
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker ${GCP_AR_LOCATION}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=${GCP_AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_AR_REPOSITORY}/fastapi-healthcheck:${IMAGE_TAG}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"