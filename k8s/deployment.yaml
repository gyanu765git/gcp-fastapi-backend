apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-healthcheck
  labels:
    app: fastapi-healthcheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-healthcheck
  template:
    metadata:
      labels:
        app: fastapi-healthcheck
    spec:
      containers:
        - name: fastapi-healthcheck
          image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/fastapi-repo/fastapi-healthcheck:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
